name: Release

# Publishes to npm whenever a semver tag (e.g. "0.1.1") is pushed.
# Bump the "version" field in package.json to match the tag BEFORE tagging:
#   npm version 0.1.1 --no-git-tag-version && git commit -am "chore(release): 0.1.1"
#   git tag 0.1.1 && git push origin main && git push origin 0.1.1
on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC), no NPM_TOKEN secret needed

jobs:
  publish:
    name: Build & publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ github.ref_name }}" ]; then
            echo "::error::Tag ${{ github.ref_name }} does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports trusted publishing (>=11.5.1)
        # Pinned to the 11.x line on purpose: npm 12 blocks native modules'
        # install scripts by default (better-sqlite3 fails to build), while
        # 11.x only warns and still runs them.
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 from source (guards against flaky prebuild downloads)
        run: npm rebuild better-sqlite3 --build-from-source

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance
